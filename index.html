<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sala do Futuro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fira Code', 'Courier New', monospace;
            padding: 10px;
            color: #00ff00;
        }

        .kali-panel {
            width: 900px;
            max-width: 100%;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }

        .ctrl-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }

        .title-text {
            color: #aaa;
            font-size: 0.8rem;
            flex-grow: 1;
            text-align: center;
        }

        .terminal-body {
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            background: #050505;
        }

        .output-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
        }

        .success { color: #00ff00; }
        .error { color: #ff5555; }
        .warning { color: #ffff55; }
        .info { color: #5555ff; }
        .kali-blue { color: #2979ff; }

        .prompt-line {
            display: flex;
            margin-top: 10px;
        }

        .prompt-text {
            color: #2979ff;
            font-weight: bold;
            margin-right: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
        }

        .hidden { display: none; }

        /* Scrollbar */
        .terminal-body::-webkit-scrollbar { width: 6px; }
        .terminal-body::-webkit-scrollbar-track { background: #050505; }
        .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .bt-btn {
            background: #2979ff;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
            font-weight: bold;
        }
        .bt-btn:hover { background: #1c54b2; }
    </style>
</head>
<body>

<div class="kali-panel">
    <div class="title-bar">
        <div class="window-controls">
            <div class="ctrl-btn close"></div>
            <div class="ctrl-btn minimize"></div>
            <div class="ctrl-btn maximize"></div>
        </div>
        <div class="title-text">root@device: ~</div>
    </div>

    <div class="terminal-body" id="terminal">
        <div id="output"></div>
        
        <div id="input-area" class="prompt-line hidden">
            <span class="prompt-text" id="prompt-label">┌──(root㉿device)-[~]<br>└─$</span>
            <input type="text" id="cmdInput" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const cmdInput = document.getElementById('cmdInput');
    const inputArea = document.getElementById('input-area');
    const promptLabel = document.getElementById('prompt-label');
    const terminal = document.getElementById('terminal');

    let currentState = 'BOOT'; 
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function print(text, type = '', delay = 0) {
        const line = document.createElement('div');
        line.className = 'output-line ' + type;
        output.appendChild(line);
        
        if (delay > 0) {
            for (let char of text) {
                line.textContent += char;
                await sleep(delay);
                terminal.scrollTop = terminal.scrollHeight;
            }
        } else {
            line.textContent = text;
        }
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function startBoot() {
        output.innerHTML = '';
        await print("Iniciando o Boot  calma ae, Sequence...", "kali-blue");
        await sleep(500);
        await print("[ OK ] Started LVM2 PV scan on device 8:2");
        await print("[ OK ] Reached target Local File Systems (Pre)");
        await print("[ OK ] Reached target Local File Systems");
        await print("[ OK ] Started Network Time Synchronization");
        await print("[ OK ] Reached target Network");
        await sleep(800);
        await print("Injecting boot...", "warning");
        await sleep(1000);
        await print("Executing system core... / calma mano ta quase lá", "success");
        await sleep(1000);
        
        currentState = 'KEY';
        await print("\nSISTEMA BLOQUEADO", "error");
        await print("Por favor, insira a KEY de acesso:");
        showInput("KEY: ");
    }

    function showInput(label = "Seleção: ") {
        inputArea.classList.remove('hidden');
        promptLabel.innerHTML = label;
        cmdInput.value = '';
        cmdInput.focus();
    }

    function hideInput() {
        inputArea.classList.add('hidden');
    }

    async function showMenu() {
        currentState = 'MENU';
        await print("\n========================================", "kali-blue");
        await print("       PARDAL SERVIÇOS - PAINEL v4.0", "kali-blue");
        await print("========================================", "kali-blue");
        await print("Selecione o serviço:");
        await print("1 - Derrubar Wifi Próximo ");
        await print("2 - Derrubar Todos os Bluetooth Próximos (Fones etc hehe),");
        await print("0 - Sair / Reboot");
        showInput("Seleção: ");
    }

    async function serviceWifi() {
        hideInput();
        await print("\n[!] Iniciando módulo de detecção Wi-Fi...", "warning");
        await sleep(1000);
        await print("[*] Verificando interface wlan0...");
        await sleep(800);
        await print("[+] Interface em modo monitor ativada.");
        await print("[*] Escaneando redes Wi-Fi próximas...");
        await sleep(2000);
        
        const networks = [
            {ssid: "Desconhecida", signal: "-45dBm", bssid: "A4:B1:C1:D2:E3:F4"},
            {ssid: "Viternet_Conde_Matarazzo", signal: "+5G Detectado...", bssid: "B2:C2:D3:E4:F5:A6"},
            {ssid: "Desconhecida", signal: "-", bssid: "C3:D3:E4:F5:A6:B7"},
            {ssid: "SEDUC-ADM", signal: "Sem Internet", bssid: "-Warning!A6:B7:C8"}
        ];

        await print("\n[+] Redes detectadas:");
        networks.forEach((n, i) => {
            print(`${i+1} - SSID: ${n.ssid} | Sinal: ${n.signal} | BSSID: ${n.bssid}`);
        });
        await sleep(1000);

        const target = networks[0]; 
        await print(`\n[!] ALVO DETECTADO: ${target.ssid}`, "warning");
        await print("[*] Capturando Handshake...");
        await sleep(1500);
        await print("[+] Handshake capturado com sucesso!", "success");
        
        await print("[*] Iniciando ataque de desautenticação em massa...");
        await sleep(1000);

        for(let i=1; i<=5; i++) {
            await print(`[DEAUTH] Enviando pacotes para ${target.bssid} (Pacote ${i}/5)...`, "error");
            await sleep(600);
        }

        await print(`\n[✔] SUCESSO: A rede ${target.ssid} foi derrubada.`, "success");
        await print("[!] Dispositivos desconectados.", "warning");
        await sleep(2000);
        showMenu();
    }

    async function serviceBluetoothReal() {
        hideInput();
        await print("\n[!] Ativando Bluetooth Stack Real...", "warning");
        await sleep(500);
        await print("[*] Aguardando permissão do usuário para acessar hardware...");
        
        const btn = document.createElement('button');
        btn.className = 'bt-btn';
        btn.innerText = 'CLIQUE PARA ESCANEAR DISPOSITIVOS REAIS';
        output.appendChild(btn);
        terminal.scrollTop = terminal.scrollHeight;

        btn.onclick = async () => {
            btn.remove();
            try {
                await print("[*] Solicitando acesso ao Bluetooth via Web API...", "info");
                
                // Solicita qualquer dispositivo Bluetooth
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });

                await print(`\n[✔] DISPOSITIVOS DETECTADO!`, "success");
                await print(`[+] Nome: ${device.name || 'Dispositivo sem nome'}`, "success");
                await print(`[+] ID: ${device.id}`, "info");
                
                await print("\n[*] Iniciando conexão de teste...", "warning");
                await sleep(1500);
                await print("[+] Conectado ao GATT Server.", "success");
                await print("[!] Interagindo com serviços do dispositivo...", "warning");
                await sleep(1000);
                await print("[✔] Teste de conexão concluído com sucesso.", "success");
                
                await sleep(2000);
                showMenu();

            } catch (error) {
                await print(`\n[!] ERRO: ${error.message}`, "error");
                if (error.name === 'NotFoundError') {
                    await print("[!] Nenhum dispositivo foi selecionado ou o Bluetooth está desligado.", "warning");
                } else if (error.name === 'SecurityError') {
                    await print("[!] O navegador bloqueou o acesso por segurança (requer HTTPS ou localhost).", "error");
                }
                await sleep(2000);
                showMenu();
            }
        };
    }

    cmdInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const val = cmdInput.value.trim();
            const valUpper = val.toUpperCase();
            
            if (currentState === 'KEY') {
                if (valUpper === 'PARDAL') {
                    hideInput();
                    await print("KEY ACEITA. Acessando painel...", "success");
                    await sleep(1000);
                    showMenu();
                } else {
                    await print("KEY INCORRETA. Tente novamente.", "error");
                    cmdInput.value = '';
                }
            } 
            else if (currentState === 'MENU') {
                if (val === '1') serviceWifi();
                else if (val === '2') serviceBluetoothReal();
                else if (val === '0') {
                    hideInput();
                    startBoot();
                }
                else {
                    await print("Opção inválida.", "error");
                    cmdInput.value = '';
                }
            }
        }
    });

    window.onload = startBoot;
    terminal.addEventListener('click', () => cmdInput.focus());
</script>

</body>
</html>
