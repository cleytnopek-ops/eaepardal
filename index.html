<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sala do Futuro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fira Code', 'Courier New', monospace;
            padding: 10px;
            color: #00ff00;
        }

        /* LOADING SCREEN PRINCIPAL */
        .main-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Fira Code', monospace;
            color: #00ff00;
        }
        .main-loading .spinner {
            width: 70px;
            height: 70px;
            border: 3px solid #1a3a1a;
            border-top: 3px solid #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .main-loading .title {
            font-size: 28px;
            letter-spacing: 4px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ff00;
        }
        .main-loading .status {
            font-size: 14px;
            color: #88ff88;
        }

        /* LOGIN PANEL */
        .login-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fira Code', monospace;
        }
        .login-box {
            background: #0f0f0f;
            border: 2px solid #2979ff;
            border-radius: 12px;
            padding: 40px 50px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
        }
        .login-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #2979ff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .login-input-group {
            margin-bottom: 20px;
        }
        .login-label {
            display: block;
            color: #00ff00;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .login-field {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            color: #00ff00;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            border-radius: 4px;
        }
        .login-field:focus {
            border-color: #2979ff;
        }
        .login-btn {
            width: 100%;
            background: #2979ff;
            color: white;
            border: none;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            transition: 0.2s;
        }
        .login-btn:hover {
            background: #1c54b2;
        }
        .login-error {
            color: #ff5555;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }

        .kali-panel {
            width: 1100px;
            max-width: 100%;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }

        .ctrl-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }

        .title-text {
            color: #aaa;
            font-size: 0.8rem;
            flex-grow: 1;
            text-align: center;
        }

        .terminal-body {
            padding: 20px;
            height: 580px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            background: #050505;
        }

        .output-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .success { color: #00ff00; }
        .error { color: #ff5555; }
        .warning { color: #ffff55; }
        .info { color: #5555ff; }
        .kali-blue { color: #2979ff; }
        .glitch { color: #ff88ff; text-shadow: 0 0 2px magenta; }

        .prompt-line {
            display: flex;
            margin-top: 10px;
        }

        .prompt-text {
            color: #2979ff;
            font-weight: bold;
            margin-right: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
        }

        .hidden { display: none; }

        .terminal-body::-webkit-scrollbar { width: 6px; }
        .terminal-body::-webkit-scrollbar-track { background: #050505; }
        .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .bt-btn {
            background: #2979ff;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        .bt-btn:hover { background: #1c54b2; transform: scale(0.98); }
        
        .script-box {
            background: #0a0a1a;
            border-left: 4px solid #2979ff;
            padding: 12px;
            margin: 12px 0;
            font-size: 12px;
            color: #bbffbb;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .lab-panel {
            background: #0a0a0e;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            padding: 15px;
            margin: 12px 0;
        }
        .lab-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .lab-btn {
            background: #2a2a4a;
            border: none;
            color: #cc88ff;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }
        .lab-btn:hover { background: #4a4a7a; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Fira Code', monospace;
            color: #00ff00;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid #1a3a1a;
            border-top: 3px solid #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        .loading-text {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .creator-name {
            margin-top: 40px;
            font-size: 14px;
            color: #ff66cc;
            border-top: 1px solid #2a2a2a;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="kali-panel" id="mainPanel" style="display: none;">
    <div class="title-bar">
        <div class="window-controls">
            <div class="ctrl-btn close"></div>
            <div class="ctrl-btn minimize"></div>
            <div class="ctrl-btn maximize"></div>
        </div>
        <div class="title-text">root@pardal:~// v7.0</div>
    </div>

    <div class="terminal-body" id="terminal">
        <div id="output"></div>
        <div id="input-area" class="prompt-line hidden">
            <span class="prompt-text" id="prompt-label">┌──(root㉿device)-[~]<br>└─$</span>
            <input type="text" id="cmdInput" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>
</div>

<script>
    // Elementos
    const mainPanel = document.getElementById('mainPanel');
    const output = document.getElementById('output');
    const cmdInput = document.getElementById('cmdInput');
    const inputArea = document.getElementById('input-area');
    const promptLabel = document.getElementById('prompt-label');
    const terminalDiv = document.getElementById('terminal');

    let currentState = 'BOOT'; 
    let activeTVDevice = null;
    let tvSpamInterval = null;
    let attackInterval = null;

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function print(text, type = '', delay = 0) {
        const line = document.createElement('div');
        line.className = 'output-line ' + type;
        output.appendChild(line);
        
        if (delay > 0) {
            for (let char of text) {
                line.textContent += char;
                await sleep(delay);
                terminalDiv.scrollTop = terminalDiv.scrollHeight;
            }
        } else {
            line.textContent = text;
        }
        terminalDiv.scrollTop = terminalDiv.scrollHeight;
    }

    // Inicializacao com loading e login
    function showLoadingAndLogin() {
        // Criar loading screen
        const loadingScreen = document.createElement('div');
        loadingScreen.className = 'main-loading';
        loadingScreen.id = 'mainLoadingScreen';
        loadingScreen.innerHTML = `
            <div class="spinner"></div>
            <div class="title">PAINEL PARDAL</div>
            <div class="status">CARREGANDO...</div>
        `;
        document.body.appendChild(loadingScreen);
        
        // Após 2.5 segundos, mostrar tela de login
        setTimeout(() => {
            loadingScreen.remove();
            
            // Criar tela de login
            const loginScreen = document.createElement('div');
            loginScreen.className = 'login-panel';
            loginScreen.id = 'loginScreen';
            loginScreen.innerHTML = `
                <div class="login-box">
                    <div class="login-title">PAINEL PARDAL - LOGIN</div>
                    <div class="login-input-group">
                        <div class="login-label">USER:</div>
                        <input type="text" id="loginUser" class="login-field" autocomplete="off">
                    </div>
                    <div class="login-input-group">
                        <div class="login-label">SENHA:</div>
                        <input type="password" id="loginPass" class="login-field" autocomplete="off">
                    </div>
                    <button id="loginBtn" class="login-btn">ENTRAR</button>
                    <div id="loginError" class="login-error"></div>
                </div>
            `;
            document.body.appendChild(loginScreen);
            
            const userInput = document.getElementById('loginUser');
            const passInput = document.getElementById('loginPass');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            
            const attemptLogin = () => {
                const user = userInput.value.trim();
                const pass = passInput.value.trim();
                
                if (user === "pardal" && pass === "pardal") {
                    loginScreen.remove();
                    mainPanel.style.display = "flex";
                    startSystem();
                } else {
                    loginError.innerText = "ACESSO NEGADO! USER ou SENHA incorretos.";
                    userInput.value = "";
                    passInput.value = "";
                    userInput.focus();
                }
            };
            
            loginBtn.onclick = attemptLogin;
            userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });
            passInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });
            userInput.focus();
        }, 2500);
    }
    
    async function startSystem() {
        // Inicializar o terminal
        output.innerHTML = '';
        if (tvSpamInterval) clearInterval(tvSpamInterval);
        if (attackInterval) clearInterval(attackInterval);
        
        await print("Inicializando PARDAL CORE v7.0", "kali-blue");
        await sleep(400);
        await print("[ OK ] Modulos de seguranca carregados");
        await print("[ OK ] Protocolos de rede ativados");
        await print("[ OK ] Modulo de ataque a notebooks pronto");
        await sleep(700);
        await print("[!] Sistema pronto para operacao", "warning");
        await sleep(600);
        
        currentState = 'MENU';
        await showMenu();
    }

    function showInput(label = "Selecao: ") {
        inputArea.classList.remove('hidden');
        promptLabel.innerHTML = label;
        cmdInput.value = '';
        cmdInput.focus();
    }

    function hideInput() {
        inputArea.classList.add('hidden');
    }

    async function showMenu() {
        currentState = 'MENU';
        await print("\n" + "=".repeat(50), "kali-blue");
        await print("        PARDAL SERVICOS - v7.0", "kali-blue");
        await print("=".repeat(50), "kali-blue");
        await print("Selecione o modulo:");
        await print("1  - Derrubar Wifi Proximo");
        await print("2  - Derrubar Bluetooth");
        await print("3  - Banir WhatsApp");
        await print("4  - Travar Notebooks (Trava Pouco + Compensa )");
        await print("5  - Interferir em Televisoes");
        await print("6  - Abrir Site Bloqueado (Bypass pra usar na Escola)");
        await print("0  - Reiniciar o Sistema");
        showInput("OPÇAO > ");
    }

    // Servico 1 - Wifi
    async function serviceWifi() {
        hideInput();
        await print("\n[!] Iniciando modulo de ataque Wi-Fi", "warning");
        await sleep(800);
        await print("[*] Escaneando redes proximas...");
        await sleep(1000);
        await print("[+] Rede alvo: Viternet_Conde_Matarazzo | BSSID: 5G AA:BB:CC:DD:EE:FF", "success");
        for(let i=1;i<=5;i++) {
            await print(`[DEAUTH] Enviando pacote ${i}/40`, "error");
            await sleep(400);
        }
        await print("[+] Rede travada com sucesso", "success");
        await sleep(1500);
        showMenu();
    }

    // Servico 2 - Bluetooth real
    async function serviceBluetooth() {
        hideInput();
        await print("\n[!] Iniciando varredura Bluetooth", "warning");
        const btn = document.createElement('button');
        btn.className = 'bt-btn';
        btn.innerText = "ESCANEAR DISPOSITIVOS";
        output.appendChild(btn);
        terminalDiv.scrollTop = terminalDiv.scrollHeight;
        btn.onclick = async () => {
            btn.remove();
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                await print(`\n[+] Dispositivo encontrado: ${device.name || 'Desconhecido'}`, "success");
                await print("[!] Executando dessincronizacao...", "error");
                await sleep(1000);
                await print("[+] Ataque concluido", "success");
                await sleep(1200);
                showMenu();
            } catch(e) {
                await print(`[!] Erro: ${e.message}`, "error");
                await sleep(1500);
                showMenu();
            }
        };
    }

    // Servico 3 - Banir WhatsApp
    async function banWhatsapp() {
        hideInput();
        await print("\n[!] Sistema de banimento WhatsApp", "error");
        await print("[*] Digite o numero da vitima:");
        
        const divNum = document.createElement('div');
        divNum.className = "prompt-line";
        const spanNum = document.createElement('span');
        spanNum.className = "prompt-text";
        spanNum.innerText = "NUMERO > ";
        const inputNum = document.createElement('input');
        inputNum.type = "text";
        inputNum.placeholder = "11999998888";
        inputNum.style.background = "#111";
        inputNum.style.border = "1px solid #2a6f2a";
        inputNum.style.padding = "4px";
        divNum.appendChild(spanNum);
        divNum.appendChild(inputNum);
        output.appendChild(divNum);
        inputNum.focus();
        
        const finalize = async () => {
            const numero = inputNum.value.trim();
            if(!numero) { await print("[!] Cancelado", "error"); divNum.remove(); showMenu(); return; }
            divNum.remove();
            await print(`[*] Alvo: ${numero}`, "info");
            const motivos = [
                "Spam em massa e propagacao de desinformacao",
                "Engenharia social e coleta ilegal de dados",
                "Uso de bots para extracao digital",
                "Compartilhamento de conteudo restrito",
                "Violacao dos termos de servico em larga escala"
            ];
            const motivo = motivos[Math.floor(Math.random() * motivos.length)];
            await print(`[!] Motivo do bloqueio: ${motivo}`, "warning");
            const scriptContent = `#!/bin/bash
# WhatsApp Enforcement Module
NUMERO="${numero}"
MOTIVO="${motivo}"
echo "Notificacao: O numero ${NUMERO} foi banido permanentemente."
echo "Motivo: ${MOTIVO}"
echo "Protocolo: WAB-${Math.floor(Math.random()*9000)}"
curl -s -X POST https://web.whatsapp.com/ban/execute?num=${numero} > /dev/null 2>&1
echo "[+] Relatorio enviado ao sistema global."`;
            const box = document.createElement('div');
            box.className = 'script-box';
            box.innerText = scriptContent;
            output.appendChild(box);
            const dload = document.createElement('button');
            dload.className = 'bt-btn';
            dload.innerText = "BAIXAR SCRIPT";
            output.appendChild(dload);
            dload.onclick = () => {
                const blob = new Blob([scriptContent], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ban_whatsapp_${numero}.sh`;
                a.click();
                URL.revokeObjectURL(url);
                dload.remove();
                print("[+] Download iniciado", "success");
            };
            await sleep(2000);
            showMenu();
        };
        const btnConfirm = document.createElement('button');
        btnConfirm.innerText = "CONFIRMAR";
        btnConfirm.className = "bt-btn";
        btnConfirm.style.marginLeft = "10px";
        btnConfirm.onclick = finalize;
        divNum.appendChild(btnConfirm);
        inputNum.addEventListener('keydown', (e) => { if(e.key === 'Enter') finalize(); });
    }

    // Servico 4 - TRAVAR NOTEBOOKS
    async function travarNotebooks() {
        hideInput();
        await print("\n[!] INICIANDO ATAQUE A NOTEBOOKS DA REDE", "error");
        await sleep(800);
        await print("[*] Escaneando dispositivos conectados...", "info");
        await sleep(1000);
        await print("[+] 37 dispositivos encontrados na rede local", "success");
        await print("[*] Injetando payload de travamento...", "warning");
        
        const total = 37;
        const attackPanel = document.createElement('div');
        attackPanel.className = 'lab-panel';
        attackPanel.innerHTML = `
            <div style="color:#ff5555; margin-bottom:10px;">[ATAQUE EM ANDAMENTO]</div>
            <div id="attackProgress" style="font-size:18px; font-weight:bold; color:#ffff55;">0 / ${total}</div>
            <div style="margin-top:10px;"><progress id="attackBar" value="0" max="${total}" style="width:100%; height:15px;"></progress></div>
            <div id="attackLog" style="height:120px; overflow-y:auto; margin-top:10px; font-size:11px; background:#0a0a0a; padding:5px;"></div>
            <button id="stopAttackBtn" class="bt-btn" style="background:#8b0000; margin-top:10px;">PARAR ATAQUE</button>
        `;
        output.appendChild(attackPanel);
        terminalDiv.scrollTop = terminalDiv.scrollHeight;
        
        let current = 0;
        const attackLog = document.getElementById('attackLog');
        const progressBar = document.getElementById('attackBar');
        const progressText = document.getElementById('attackProgress');
        
        const logAttack = (msg, type = 'info') => {
            const line = document.createElement('div');
            line.style.color = type === 'error' ? '#ff5555' : '#88ff88';
            line.innerText = msg;
            attackLog.appendChild(line);
            attackLog.scrollTop = attackLog.scrollHeight;
        };
        
        const stopAttack = () => {
            if (attackInterval) {
                clearInterval(attackInterval);
                attackInterval = null;
                logAttack("[!] Ataque interrompido pelo usuario", "error");
                document.getElementById('stopAttackBtn').disabled = true;
                document.getElementById('stopAttackBtn').innerText = "ATAQUE PARADO";
                setTimeout(() => {
                    attackPanel.remove();
                    showMenu();
                }, 2000);
            }
        };
        
        document.getElementById('stopAttackBtn').onclick = stopAttack;
        
        attackInterval = setInterval(async () => {
            if (current >= total) {
                clearInterval(attackInterval);
                attackInterval = null;
                logAttack("[+] ATAQUE CONCLUIDO! 37 notebooks travados.", "success");
                logAttack("[!] Sistemas afetados: Windows, Linux, macOS", "warning");
                document.getElementById('stopAttackBtn').innerText = "FINALIZADO";
                setTimeout(() => {
                    attackPanel.remove();
                    showMenu();
                }, 3000);
                return;
            }
            current++;
            progressBar.value = current;
            progressText.innerText = `${current} / ${total}`;
            
            const ips = ["192.168.1." + (100 + current), "10.0.0." + (50 + current), "172.16." + Math.floor(current/10) + "." + (current*3)];
            const ip = ips[current % ips.length];
            const hostname = `NOTE-${String.fromCharCode(65 + (current % 26))}${current}`;
            
            logAttack(`[${current}/${total}] Travando ${hostname} (${ip})...`);
            await sleep(150);
            logAttack(`[${current}/${total}] ${hostname} - CONGELADO | RAM Overload`, "error");
            await sleep(100);
        }, 400);
    }

    // Servico 5 - INTERFERIR TV
    async function interfereTV() {
        hideInput();
        await print("\n[TV] Modulo de interferencia em Televisoes", "glitch");
        await print("[*] Solicitando permissao para acessar Bluetooth...", "info");
        
        if (!navigator.bluetooth) {
            await print("[!] Web Bluetooth nao suportado neste navegador. Use Chrome/Edge em dispositivo com Bluetooth.", "error");
            await sleep(2000);
            showMenu();
            return;
        }
        
        await print("[*] Clique no botao abaixo para escanear dispositivos Bluetooth reais", "warning");
        
        const scanBtn = document.createElement('button');
        scanBtn.className = 'bt-btn';
        scanBtn.innerText = "ESCANEAR DISPOSITIVOS BLUETOOTH (TVs, Soundbars, etc)";
        output.appendChild(scanBtn);
        terminalDiv.scrollTop = terminalDiv.scrollHeight;
        
        scanBtn.onclick = async () => {
            scanBtn.remove();
            await print("[*] Procurando dispositivos Bluetooth proximos...", "info");
            
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_access']
                });
                
                const deviceName = device.name || "Dispositivo Desconhecido";
                const deviceId = device.id;
                
                await print(`\n[+] TV/DISPOSITIVO DETECTADO: ${deviceName}`, "success");
                await print(`[+] ID: ${deviceId}`, "info");
                
                activeTVDevice = device;
                
                const tvPanel = document.createElement('div');
                tvPanel.className = 'lab-panel';
                tvPanel.innerHTML = `
                    <div style="color:#ff88ff; margin-bottom:10px;">[CONTROLE DE INTERFERENCIA - ${deviceName}]</div>
                    <div class="lab-row">
                        <button id="tvConnect" class="lab-btn">CONECTAR</button>
                        <button id="tvDisconnect" class="lab-btn">DESCONECTAR</button>
                        <button id="tvSpamConnect" class="lab-btn" style="background:#8b0000;">SPAM CONEXAO (Flood)</button>
                        <button id="tvStopSpam" class="lab-btn">PARAR SPAM</button>
                    </div>
                    <div id="tvStatus" style="color:#aaa; font-size:12px; margin-top:8px;">Status: Desconectado</div>
                `;
                output.appendChild(tvPanel);
                terminalDiv.scrollTop = terminalDiv.scrollHeight;
                
                const statusDiv = document.getElementById('tvStatus');
                let gattServer = null;
                let spamActive = false;
                
                const connectToTV = async () => {
                    try {
                        if (gattServer && gattServer.connected) {
                            await print("[!] Ja conectado ao dispositivo", "warning");
                            statusDiv.innerText = "Status: Conectado";
                            return;
                        }
                        await print("[*] Tentando conectar ao dispositivo...", "info");
                        gattServer = await device.gatt.connect();
                        statusDiv.innerText = "Status: Conectado";
                        await print("[+] Conectado com sucesso ao dispositivo!", "success");
                        await print("[!] Enviando pacotes de interferencia...", "warning");
                        await sleep(500);
                        await print("[+] Sinal de dessincronizacao enviado", "success");
                    } catch(e) {
                        await print(`[!] Falha na conexao: ${e.message}`, "error");
                        statusDiv.innerText = `Status: Erro - ${e.message}`;
                    }
                };
                
                const disconnectFromTV = async () => {
                    try {
                        if (gattServer && gattServer.connected) {
                            await gattServer.disconnect();
                            gattServer = null;
                            statusDiv.innerText = "Status: Desconectado";
                            await print("[+] Desconectado do dispositivo", "success");
                        } else {
                            await print("[!] Nenhuma conexao ativa", "warning");
                        }
                    } catch(e) {
                        await print(`[!] Erro ao desconectar: ${e.message}`, "error");
                    }
                };
                
                const spamConnect = async () => {
                    if (spamActive) {
                        await print("[!] Spam ja esta ativo", "warning");
                        return;
                    }
                    spamActive = true;
                    await print("[!] INICIANDO SPAM DE CONEXAO (Flood Attack)", "error");
                    await print("[*] Conectando e desconectando rapidamente...", "warning");
                    
                    let count = 0;
                    tvSpamInterval = setInterval(async () => {
                        if (!spamActive) return;
                        count++;
                        try {
                            const tempServer = await device.gatt.connect();
                            await print(`[SPAM ${count}] Conectado ao dispositivo`, "info");
                            await sleep(100);
                            await tempServer.disconnect();
                            await print(`[SPAM ${count}] Desconectado`, "info");
                        } catch(e) {
                            await print(`[SPAM ${count}] Falha: ${e.message.substring(0,50)}`, "error");
                        }
                    }, 800);
                };
                
                const stopSpam = async () => {
                    if (tvSpamInterval) {
                        clearInterval(tvSpamInterval);
                        tvSpamInterval = null;
                        spamActive = false;
                        await print("[+] Spam de conexao interrompido", "success");
                    } else {
                        await print("[!] Nenhum spam ativo", "warning");
                    }
                };
                
                document.getElementById('tvConnect').onclick = connectToTV;
                document.getElementById('tvDisconnect').onclick = disconnectFromTV;
                document.getElementById('tvSpamConnect').onclick = spamConnect;
                document.getElementById('tvStopSpam').onclick = stopSpam;
                
                const closePanelBtn = document.createElement('button');
                closePanelBtn.className = 'bt-btn';
                closePanelBtn.style.background = "#333";
                closePanelBtn.style.marginTop = "10px";
                closePanelBtn.innerText = "FECHAR PAINEL DE TV";
                tvPanel.appendChild(closePanelBtn);
                closePanelBtn.onclick = async () => {
                    if (tvSpamInterval) clearInterval(tvSpamInterval);
                    if (gattServer && gattServer.connected) {
                        try { await gattServer.disconnect(); } catch(e) {}
                    }
                    tvPanel.remove();
                    await print("[*] Painel de TV fechado", "info");
                    showMenu();
                };
                
            } catch(e) {
                await print(`[!] Erro no scan: ${e.message}`, "error");
                if (e.name === 'NotFoundError') {
                    await print("[!] Nenhum dispositivo selecionado ou scan cancelado", "warning");
                } else if (e.name === 'SecurityError') {
                    await print("[!] HTTPS necessario para Web Bluetooth (ou localhost)", "error");
                }
                await sleep(2000);
                showMenu();
            }
        };
    }

    // Servico 6 - ABRIR SITE BLOQUEADO
    async function abrirSiteBloqueado() {
        hideInput();
        await print("\n[+] BYPASS FIREWALL ESCOLAR", "kali-blue");
        await print("[*] Digite o URL do site bloqueado (ex: youtube.com, instagram.com):");
        
        const divUrl = document.createElement('div');
        divUrl.className = "prompt-line";
        const spanUrl = document.createElement('span');
        spanUrl.className = "prompt-text";
        spanUrl.innerText = "URL > ";
        const inputUrl = document.createElement('input');
        inputUrl.type = "text";
        inputUrl.placeholder = "exemplo.com";
        inputUrl.style.background = "#111";
        inputUrl.style.border = "1px solid #2a6f2a";
        inputUrl.style.padding = "4px";
        divUrl.appendChild(spanUrl);
        divUrl.appendChild(inputUrl);
        output.appendChild(divUrl);
        inputUrl.focus();
        
        const abrirSite = async () => {
            let siteUrl = inputUrl.value.trim();
            if(!siteUrl) {
                await print("[!] URL invalida", "error");
                divUrl.remove();
                showMenu();
                return;
            }
            if(!siteUrl.startsWith("http")) {
                siteUrl = "https://" + siteUrl;
            }
            divUrl.remove();
            await print(`[*] Bypass ativado para: ${siteUrl}`, "info");
            await print("[*] Contornando bloqueio do proxy escolar...", "warning");
            await sleep(800);
            await print("[+] Tunel criptografado estabelecido", "success");
            await sleep(500);
            
            const overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="loading-text">BYPASS ACTIVADO</div>
                <div class="loading-text" style="font-size:12px;">${siteUrl}</div>
                <div class="creator-name">CRIADO POR DAVI | SISTEMA PARDAL v7.0</div>
            `;
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                overlay.remove();
                window.open(siteUrl, '_blank');
                print("[+] Site aberto em nova aba! Bypass realizado com sucesso.", "success");
                sleep(1500).then(() => showMenu());
            }, 2000);
        };
        
        const btnConfirm = document.createElement('button');
        btnConfirm.innerText = "ABRIR SITE";
        btnConfirm.className = "bt-btn";
        btnConfirm.style.marginLeft = "10px";
        btnConfirm.onclick = abrirSite;
        divUrl.appendChild(btnConfirm);
        inputUrl.addEventListener('keydown', (e) => { if(e.key === 'Enter') abrirSite(); });
    }
    
    async function rebootSystem() {
        hideInput();
        if (tvSpamInterval) clearInterval(tvSpamInterval);
        if (attackInterval) clearInterval(attackInterval);
        await print("\n[REBOOT] Reiniciando sistema...", "warning");
        await sleep(1200);
        output.innerHTML = '';
        await startSystem();
    }

    // Handler principal
    const globalHandler = async (e) => {
        if (e.key === 'Enter') {
            const val = cmdInput.value.trim();
            if (currentState === 'MENU') {
                hideInput();
                switch(val) {
                    case '1': await serviceWifi(); break;
                    case '2': await serviceBluetooth(); break;
                    case '3': await banWhatsapp(); break;
                    case '4': await travarNotebooks(); break;
                    case '5': await interfereTV(); break;
                    case '6': await abrirSiteBloqueado(); break;
                    case '0': await rebootSystem(); break;
                    default: await print("Opcao invalida", "error"); await sleep(800); showMenu();
                }
            }
        }
    };
    
    cmdInput.addEventListener('keydown', globalHandler);
    terminalDiv.addEventListener('click', () => cmdInput.focus());
    
    // Iniciar com loading e login
    showLoadingAndLogin();
</script>
